# Кладётся в репозиторий MEGAJava505/MEGAJava505 по пути:
#   .github/workflows/metrics.yml
#
# Генерит ровно те две картинки со скринов:
#   • metrics.isocalendar.svg  — изометрический 3D-календарь коммитов
#   • metrics.topics.svg       — starred topics с иконками
#
# Перед первым запуском нужен токен (см. инструкцию в чате) → секрет METRICS_TOKEN.

name: Metrics

on:
  # обновлять раз в сутки
  schedule: [{ cron: "0 0 * * *" }]
  # и кнопкой вручную (вкладка Actions → Run workflow)
  workflow_dispatch:
  # и при пуше в main
  push: { branches: ["main"] }

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Изометрический 3D-календарь (полный год) ──
      - name: Isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MEGAJava505
          filename: metrics.isocalendar.svg
          base: ""
          config_timezone: Atlantic/Reykjavik
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── 2. Starred topics с иконками ──
      - name: Starred topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MEGAJava505
          filename: metrics.topics.svg
          base: ""
          config_timezone: Atlantic/Reykjavik
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
